services:
  loki:
    image: grafana/loki:2.9.4
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  syslog-ng:
    image: balabit/syslog-ng:latest
    ports:
      - "1514:514/udp"
    volumes:
      - ./syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - pfsense_syslog:/var/log/pfsense
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - pfsense_syslog:/var/log/pfsense:ro
      - simulator_logs:/var/log/pfsense-sim:ro
      - healthcheck_logs:/var/log/healthcheck:ro
    depends_on:
      - loki
      - syslog-ng
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-smartoffice}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

  health-prober:
    image: curlimages/curl:8.5.0
    container_name: monitoring-health-prober
    user: "0:0"
    environment:
      ACI_HEALTH_URL: ${ACI_HEALTH_URL:-http://ynov-smartoffice-b3.francecentral.azurecontainer.io:8080/health}
    volumes:
      - ./scripts/health-prober.sh:/probe.sh:ro
      - healthcheck_logs:/var/log/healthcheck
    entrypoint: ["/bin/sh", "/probe.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - loki
      - grafana
    restart: unless-stopped

  pfsense-log-simulator:
    profiles: ["simulator"]
    image: alpine:3.19
    volumes:
      - simulator_logs:/var/log/pfsense-sim
      - ./scripts/pfsense-log-generator.sh:/generator.sh:ro
    entrypoint: ["/bin/sh", "/generator.sh"]
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
  pfsense_syslog:
  simulator_logs:
  healthcheck_logs:
