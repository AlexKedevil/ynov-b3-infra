server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Sondes HTTP (health-prober -> fichier partagé)
  - job_name: healthcheck
    static_configs:
      - targets: [localhost]
        labels:
          job: healthcheck
          source: health-prober
          __path__: /var/log/healthcheck/probes.log

  # Logs réels pfSense (VMware) — syslog UDP 10.20.0.254:1514 → syslog-ng → fichier
  - job_name: pfsense-syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: pfsense
          source: pfsense-vm
          __path__: /var/log/pfsense/remote.log
  # Fichiers simulateur (profile simulator)
  - job_name: pfsense-simulator
    static_configs:
      - targets: [localhost]
        labels:
          job: pfsense
          source: simulator
          __path__: /var/log/pfsense-sim/*.log

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*(room-booking|postgres|redis|health-prober).*"
        action: keep
      - target_label: job
        replacement: docker
    pipeline_stages:
      - json:
          expressions:
            log_line: log
      - output:
          source: log_line
