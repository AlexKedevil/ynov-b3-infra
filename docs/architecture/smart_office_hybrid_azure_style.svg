<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: 600; fill: #323130; }
      .subtitle { font-size: 12px; fill: #605E5C; }
      .zone-label { font-size: 11px; font-weight: 600; fill: #323130; }
      .icon-label { font-size: 11px; fill: #323130; }
      .icon-sublabel { font-size: 9px; fill: #605E5C; }
      .flow-label { font-size: 10px; fill: #0078D4; font-weight: 600; }
      .log-label { font-size: 9px; fill: #8764B8; }
      .footer { font-size: 10px; fill: #8A8886; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#605E5C"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#0078D4"/>
    </marker>
    <marker id="arr-purple" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#8764B8"/>
    </marker>

    <!-- Icon: Internet cloud -->
    <symbol id="ico-cloud" viewBox="0 0 48 48">
      <ellipse cx="24" cy="30" rx="18" ry="10" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <ellipse cx="16" cy="26" rx="10" ry="8" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <ellipse cx="32" cy="26" rx="10" ry="8" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>
    <!-- Icon: VPN / tunnel -->
    <symbol id="ico-vpn" viewBox="0 0 48 48">
      <rect x="8" y="14" width="32" height="22" rx="3" fill="#FFF4CE" stroke="#FFB900" stroke-width="1.5"/>
      <path d="M14 28 L24 20 L34 28" fill="none" stroke="#FFB900" stroke-width="2"/>
      <circle cx="24" cy="32" r="3" fill="#FFB900"/>
    </symbol>
    <!-- Icon: Firewall -->
    <symbol id="ico-firewall" viewBox="0 0 48 48">
      <path d="M24 6 L40 14 V26 C40 34 24 42 24 42 C24 42 8 34 8 26 V14 Z" fill="#FDE7E9" stroke="#D83B01" stroke-width="1.5"/>
      <path d="M24 16 L30 22 L24 28 L18 22 Z" fill="#D83B01"/>
    </symbol>
    <!-- Icon: VMware host -->
    <symbol id="ico-host" viewBox="0 0 48 48">
      <rect x="10" y="10" width="28" height="30" rx="2" fill="#E6F2E6" stroke="#107C10" stroke-width="1.5"/>
      <rect x="14" y="16" width="20" height="4" rx="1" fill="#107C10" opacity="0.3"/>
      <rect x="14" y="24" width="20" height="4" rx="1" fill="#107C10" opacity="0.3"/>
      <rect x="14" y="32" width="20" height="4" rx="1" fill="#107C10" opacity="0.3"/>
    </symbol>
    <!-- Icon: Container / ACI -->
    <symbol id="ico-container" viewBox="0 0 48 48">
      <rect x="8" y="14" width="32" height="24" rx="2" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <line x1="8" y1="22" x2="40" y2="22" stroke="#0078D4" stroke-width="1"/>
      <rect x="14" y="26" width="8" height="8" fill="#0078D4" opacity="0.25"/>
      <rect x="26" y="26" width="8" height="8" fill="#0078D4" opacity="0.25"/>
    </symbol>
    <!-- Icon: Database -->
    <symbol id="ico-db" viewBox="0 0 48 48">
      <ellipse cx="24" cy="14" rx="14" ry="6" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <path d="M10 14 V32 C10 36 16 38 24 38 C32 38 38 36 38 32 V14" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <ellipse cx="24" cy="24" rx="14" ry="5" fill="none" stroke="#0078D4" stroke-width="1"/>
    </symbol>
    <!-- Icon: Key / Entra ID -->
    <symbol id="ico-identity" viewBox="0 0 48 48">
      <circle cx="20" cy="20" r="10" fill="#F3F2F1" stroke="#0078D4" stroke-width="1.5"/>
      <circle cx="20" cy="18" r="4" fill="#0078D4" opacity="0.4"/>
      <path d="M28 28 L40 40" stroke="#FFB900" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="4" fill="#FFB900"/>
    </symbol>
    <!-- Icon: Registry ACR -->
    <symbol id="ico-registry" viewBox="0 0 48 48">
      <rect x="10" y="12" width="28" height="26" rx="2" fill="#F3F2F1" stroke="#0078D4" stroke-width="1.5"/>
      <rect x="16" y="18" width="16" height="4" fill="#0078D4" opacity="0.3"/>
      <rect x="16" y="26" width="16" height="4" fill="#0078D4" opacity="0.3"/>
    </symbol>
    <!-- Icon: Blob storage -->
    <symbol id="ico-blob" viewBox="0 0 48 48">
      <rect x="10" y="14" width="28" height="22" rx="2" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,2"/>
      <path d="M16 22 H32 M16 28 H28" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>
    <!-- Icon: Grafana monitor -->
    <symbol id="ico-monitor" viewBox="0 0 48 48">
      <rect x="8" y="12" width="32" height="22" rx="2" fill="#F4ECFF" stroke="#8764B8" stroke-width="1.5"/>
      <path d="M14 30 L22 22 L28 26 L34 18" fill="none" stroke="#8764B8" stroke-width="2"/>
      <rect x="18" y="36" width="12" height="4" fill="#8764B8" opacity="0.4"/>
    </symbol>
    <!-- Icon: GitHub Actions -->
    <symbol id="ico-cicd" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="16" fill="#F3F2F1" stroke="#24292F" stroke-width="1.5"/>
      <path d="M24 14 V24 L30 30" fill="none" stroke="#24292F" stroke-width="2"/>
    </symbol>
    <!-- Icon: Redis cache -->
    <symbol id="ico-cache" viewBox="0 0 48 48">
      <rect x="12" y="16" width="24" height="18" rx="2" fill="#FDE7E9" stroke="#D13438" stroke-width="1.5"/>
      <text x="24" y="29" text-anchor="middle" font-size="9" fill="#D13438" font-weight="700">Redis</text>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" class="title">Smart Office 2.0 - Architecture hybride</text>
  <text x="700" y="56" text-anchor="middle" class="subtitle">PoC B3 - Lab VMware on-prem + Azure France Central - Flaujat Sam, Queudeville Alexandre</text>

  <!-- Outer boundary (like Resource Groups) -->
  <rect x="30" y="75" width="1340" height="780" rx="4" fill="none" stroke="#8A8886" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="1340" y="845" text-anchor="end" class="zone-label">Smart Office 2.0 - PoC Infrastructure</text>

  <!-- ===== LEFT: External / Users ===== -->
  <rect x="55" y="100" width="155" height="340" rx="4" fill="none" stroke="#8A8886" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="132" y="122" text-anchor="middle" class="zone-label">Utilisateurs</text>

  <use href="#ico-cloud" x="108" y="140" width="48" height="48"/>
  <text x="132" y="202" text-anchor="middle" class="icon-label">Internet</text>
  <text x="132" y="216" text-anchor="middle" class="icon-sublabel">HTTPS public</text>

  <line x1="132" y1="225" x2="132" y2="248" stroke="#605E5C" stroke-width="1.2" marker-end="url(#arr)"/>

  <use href="#ico-vpn" x="108" y="255" width="48" height="48"/>
  <text x="132" y="317" text-anchor="middle" class="icon-label">WireGuard</text>
  <text x="132" y="331" text-anchor="middle" class="icon-sublabel">10.20.100.0/24</text>
  <text x="132" y="345" text-anchor="middle" class="icon-sublabel">UDP :51820</text>

  <line x1="132" y1="355" x2="132" y2="378" stroke="#605E5C" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="78" y="385" width="108" height="42" rx="3" fill="#FAFAFA" stroke="#E1DFDD"/>
  <text x="132" y="403" text-anchor="middle" class="icon-label">Employes</text>
  <text x="132" y="417" text-anchor="middle" class="icon-sublabel">Teletravail / Bureau</text>

  <!-- Flow: Users -> pfSense -->
  <line x1="210" y1="280" x2="268" y2="280" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="235" y="272" class="flow-label">VPN</text>

  <!-- ===== CENTER-LEFT: On-Prem VMware ===== -->
  <rect x="268" y="100" width="520" height="500" rx="4" fill="#FAFAFA" stroke="#107C10" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="290" y="122" class="zone-label">On-Premise - Lab VMware (CachyOS)</text>
  <text x="290" y="138" class="icon-sublabel">10.20.0.0/16 - vmnet2 promiscuous</text>

  <!-- pfSense -->
  <rect x="290" y="155" width="200" height="130" rx="4" fill="#FFFFFF" stroke="#E1DFDD" stroke-dasharray="5,3"/>
  <use href="#ico-firewall" x="366" y="168" width="48" height="48"/>
  <text x="390" y="228" text-anchor="middle" class="icon-label">pfSense VM</text>
  <text x="390" y="242" text-anchor="middle" class="icon-sublabel">WAN vmnet8 | LAN 10.20.0.1</text>
  <text x="390" y="256" text-anchor="middle" class="icon-sublabel">WireGuard 10.20.100.1/24</text>
  <text x="390" y="270" text-anchor="middle" class="icon-sublabel">6 VLAN 802.1Q</text>

  <!-- VMware host -->
  <rect x="510" y="155" width="255" height="130" rx="4" fill="#FFFFFF" stroke="#E1DFDD" stroke-dasharray="5,3"/>
  <use href="#ico-host" x="614" y="168" width="48" height="48"/>
  <text x="638" y="228" text-anchor="middle" class="icon-label">Hote VMware</text>
  <text x="638" y="242" text-anchor="middle" class="icon-sublabel">10.20.0.254 / vmnet2</text>
  <text x="638" y="256" text-anchor="middle" class="icon-sublabel">Docker: room-booking local</text>

  <line x1="490" y1="220" x2="510" y2="220" stroke="#605E5C" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- VLANs sub-box -->
  <rect x="290" y="300" width="475" height="95" rx="4" fill="#FFFFFF" stroke="#E1DFDD" stroke-dasharray="5,3"/>
  <text x="305" y="318" class="icon-label">Segmentation VLAN</text>
  <rect x="300" y="328" width="68" height="28" rx="2" fill="#E1D5E7" stroke="#9673A6"/><text x="334" y="346" text-anchor="middle" class="icon-sublabel">V10 MGMT</text>
  <rect x="376" y="328" width="68" height="28" rx="2" fill="#D5E8D4" stroke="#82B366"/><text x="410" y="346" text-anchor="middle" class="icon-sublabel">V20 USERS</text>
  <rect x="452" y="328" width="68" height="28" rx="2" fill="#D5E8D4" stroke="#82B366"/><text x="486" y="346" text-anchor="middle" class="icon-sublabel">V30 WIFI</text>
  <rect x="528" y="328" width="68" height="28" rx="2" fill="#FFF2CC" stroke="#D6B656"/><text x="562" y="346" text-anchor="middle" class="icon-sublabel">V40 GUEST</text>
  <rect x="604" y="328" width="68" height="28" rx="2" fill="#F8CECC" stroke="#B85450"/><text x="638" y="346" text-anchor="middle" class="icon-sublabel">V50 SERV</text>
  <rect x="680" y="328" width="68" height="28" rx="2" fill="#FFE6CC" stroke="#D79B00"/><text x="714" y="346" text-anchor="middle" class="icon-sublabel">V60 DMZ</text>
  <text x="528" y="382" text-anchor="middle" class="icon-sublabel">VPN acces: VLAN 20 + 50 uniquement</text>

  <!-- Supervision on-prem -->
  <rect x="290" y="410" width="200" height="100" rx="4" fill="#FFFFFF" stroke="#E1DFDD" stroke-dasharray="5,3"/>
  <use href="#ico-monitor" x="366" y="420" width="48" height="48"/>
  <text x="390" y="480" text-anchor="middle" class="icon-label">Grafana + Loki</text>
  <text x="390" y="494" text-anchor="middle" class="icon-sublabel">Promtail + syslog-ng</text>

  <!-- Flow on-prem to Azure -->
  <line x1="788" y1="350" x2="848" y2="350" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="810" y="342" class="flow-label">HTTPS</text>

  <!-- Syslog to monitoring -->
  <path d="M430 285 Q430 520 1180 520" fill="none" stroke="#8764B8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="700" y="512" text-anchor="middle" class="log-label">Syslog pfSense UDP :1514 - logs firewall</text>

  <!-- ===== CENTER-RIGHT: Azure ===== -->
  <rect x="848" y="100" width="500" height="500" rx="4" fill="#F8FBFF" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="870" y="122" class="zone-label">Azure - France Central</text>
  <text x="870" y="138" class="icon-sublabel">rg-smartoffice - smartofficeynov ACR</text>

  <!-- Row 1: Identity + Registry -->
  <use href="#ico-identity" x="880" y="160" width="48" height="48"/>
  <text x="904" y="222" text-anchor="middle" class="icon-label">Entra ID</text>
  <text x="904" y="236" text-anchor="middle" class="icon-sublabel">IAM / JWT / MFA</text>

  <use href="#ico-registry" x="1000" y="160" width="48" height="48"/>
  <text x="1024" y="222" text-anchor="middle" class="icon-label">ACR</text>
  <text x="1024" y="236" text-anchor="middle" class="icon-sublabel">smartofficeynov</text>

  <use href="#ico-blob" x="1120" y="160" width="48" height="48"/>
  <text x="1144" y="222" text-anchor="middle" class="icon-label">Blob Storage</text>
  <text x="1144" y="236" text-anchor="middle" class="icon-sublabel">pg_dump backups</text>

  <!-- App Service Plan style box -->
  <rect x="870" y="260" width="455" height="200" rx="4" fill="#FFFFFF" stroke="#0078D4" stroke-dasharray="6,4"/>
  <text x="885" y="280" class="icon-label">Container Instances - room-booking</text>

  <use href="#ico-container" x="900" y="295" width="48" height="48"/>
  <text x="924" y="357" text-anchor="middle" class="icon-label">ACI</text>
  <text x="924" y="371" text-anchor="middle" class="icon-sublabel">Flask API :8080</text>
  <text x="924" y="385" text-anchor="middle" class="icon-sublabel">FQDN public</text>

  <line x1="960" y1="330" x2="1000" y2="330" stroke="#0078D4" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <use href="#ico-db" x="1000" y="295" width="48" height="48"/>
  <text x="1024" y="357" text-anchor="middle" class="icon-label">PostgreSQL</text>
  <text x="1024" y="371" text-anchor="middle" class="icon-sublabel">Donnees relationnelles</text>

  <line x1="1060" y1="330" x2="1100" y2="330" stroke="#0078D4" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <use href="#ico-cache" x="1100" y="295" width="48" height="48"/>
  <text x="1124" y="357" text-anchor="middle" class="icon-label">Redis</text>
  <text x="1124" y="371" text-anchor="middle" class="icon-sublabel">Cache NoSQL</text>

  <text x="1097" y="420" text-anchor="middle" class="icon-sublabel">AUTH_DISABLED=true en PoC (tenant Ynov limite)</text>

  <!-- Entra to ACI -->
  <path d="M904 208 L924 295" fill="none" stroke="#0078D4" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="878" y="255" class="flow-label">JWT</text>

  <!-- ===== RIGHT: Monitoring column ===== -->
  <rect x="1180" y="100" width="175" height="340" rx="4" fill="#FAFAFA" stroke="#8764B8" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="1267" y="122" text-anchor="middle" class="zone-label">Supervision PoC</text>

  <use href="#ico-monitor" x="1243" y="145" width="48" height="48"/>
  <text x="1267" y="207" text-anchor="middle" class="icon-label">Grafana</text>
  <text x="1267" y="221" text-anchor="middle" class="icon-sublabel">Dashboards LogQL</text>

  <rect x="1200" y="235" width="135" height="36" rx="3" fill="#F4ECFF" stroke="#8764B8"/>
  <text x="1267" y="257" text-anchor="middle" class="icon-label">Loki</text>

  <rect x="1200" y="285" width="135" height="36" rx="3" fill="#F4ECFF" stroke="#8764B8"/>
  <text x="1267" y="307" text-anchor="middle" class="icon-label">Promtail</text>

  <text x="1267" y="345" text-anchor="middle" class="icon-sublabel">SIEM Wazuh</text>
  <text x="1267" y="359" text-anchor="middle" class="icon-sublabel">= cible production</text>
  <text x="1267" y="373" text-anchor="middle" class="icon-sublabel">PoC: Grafana/Loki</text>

  <!-- Logs from ACI -->
  <path d="M1124 400 Q1200 460 1267 380" fill="none" stroke="#8764B8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <text x="1185" y="448" class="log-label">Logs app</text>

  <!-- ===== BOTTOM: CI/CD ===== -->
  <rect x="268" y="630" width="1087" height="120" rx="4" fill="#FAFAFA" stroke="#24292F" stroke-width="1" stroke-dasharray="8,5"/>
  <text x="290" y="652" class="zone-label">DevOps / CI-CD</text>

  <use href="#ico-cicd" x="310" y="665" width="48" height="48"/>
  <text x="334" y="727" text-anchor="middle" class="icon-label">GitHub Actions</text>
  <text x="334" y="741" text-anchor="middle" class="icon-sublabel">azure-deploy.yml</text>

  <line x1="370" y1="695" x2="430" y2="695" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="395" y="687" class="flow-label">build</text>

  <use href="#ico-registry" x="430" y="665" width="48" height="48"/>
  <text x="454" y="727" text-anchor="middle" class="icon-label">Push ACR</text>

  <line x1="490" y1="695" x2="550" y2="695" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="515" y="687" class="flow-label">deploy</text>

  <use href="#ico-container" x="550" y="665" width="48" height="48"/>
  <text x="574" y="727" text-anchor="middle" class="icon-label">Deploy ACI</text>

  <line x1="610" y1="695" x2="900" y2="450" stroke="#0078D4" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>

  <!-- Internet to Azure HTTPS -->
  <path d="M156 200 Q500 80 924 310" fill="none" stroke="#0078D4" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="520" y="95" class="flow-label">HTTPS utilisateurs (pas VPN site-to-site en PoC)</text>

  <!-- Footer -->
  <text x="700" y="890" text-anchor="middle" class="footer">Reference style: Azure Architecture diagram - Smart Office 2.0 hybrid PoC B3 INFRA 2026</text>
</svg>
