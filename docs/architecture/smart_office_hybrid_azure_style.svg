<?xml version="1.0" encoding="UTF-8"?>
<!-- Style Azure. Fleches simplifiees comme smart_office_hybrid.svg (classique).
     Edition : Inkscape, draw.io (importer SVG), ou VS Code + preview SVG. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: 600; fill: #323130; }
      .subtitle { font-size: 12px; fill: #605E5C; }
      .zone-label { font-size: 11px; font-weight: 600; fill: #323130; }
      .icon-label { font-size: 11px; fill: #323130; }
      .icon-sublabel { font-size: 9px; fill: #605E5C; }
      .flow { font-size: 10px; fill: #0078D4; font-weight: 600; }
      .flow-gray { font-size: 10px; fill: #605E5C; font-weight: 600; }
      .note { font-size: 10px; fill: #8A8886; font-style: italic; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#605E5C"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0078D4"/>
    </marker>
    <symbol id="ico-cloud" viewBox="0 0 48 48">
      <ellipse cx="24" cy="30" rx="18" ry="10" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <ellipse cx="16" cy="26" rx="10" ry="8" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
      <ellipse cx="32" cy="26" rx="10" ry="8" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>
    <symbol id="ico-vpn" viewBox="0 0 48 48">
      <rect x="8" y="14" width="32" height="22" rx="3" fill="#FFF4CE" stroke="#FFB900" stroke-width="1.5"/>
      <path d="M14 28 L24 20 L34 28" fill="none" stroke="#FFB900" stroke-width="2"/>
    </symbol>
    <symbol id="ico-firewall" viewBox="0 0 48 48">
      <path d="M24 6 L40 14 V26 C40 34 24 42 24 42 C24 42 8 34 8 26 V14 Z" fill="#FDE7E9" stroke="#D83B01" stroke-width="1.5"/>
      <path d="M24 16 L30 22 L24 28 L18 22 Z" fill="#D83B01"/>
    </symbol>
    <symbol id="ico-host" viewBox="0 0 48 48">
      <rect x="10" y="10" width="28" height="30" rx="2" fill="#E6F2E6" stroke="#107C10" stroke-width="1.5"/>
    </symbol>
    <symbol id="ico-container" viewBox="0 0 48 48">
      <rect x="8" y="14" width="32" height="24" rx="2" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>
    <symbol id="ico-identity" viewBox="0 0 48 48">
      <circle cx="20" cy="20" r="10" fill="#F3F2F1" stroke="#0078D4" stroke-width="1.5"/>
      <path d="M28 28 L40 40" stroke="#FFB900" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <symbol id="ico-registry" viewBox="0 0 48 48">
      <rect x="10" y="12" width="28" height="26" rx="2" fill="#F3F2F1" stroke="#0078D4" stroke-width="1.5"/>
    </symbol>
    <symbol id="ico-blob" viewBox="0 0 48 48">
      <rect x="10" y="14" width="28" height="22" rx="2" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,2"/>
    </symbol>
    <symbol id="ico-monitor" viewBox="0 0 48 48">
      <rect x="8" y="12" width="32" height="22" rx="2" fill="#F4ECFF" stroke="#8764B8" stroke-width="1.5"/>
      <path d="M14 30 L22 22 L28 26 L34 18" fill="none" stroke="#8764B8" stroke-width="2"/>
    </symbol>
    <symbol id="ico-cicd" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="16" fill="#F3F2F1" stroke="#24292F" stroke-width="1.5"/>
    </symbol>
  </defs>

  <rect width="1280" height="820" fill="#FFFFFF"/>
  <text x="640" y="36" text-anchor="middle" class="title">Smart Office 2.0 - Architecture hybride</text>
  <text x="640" y="56" text-anchor="middle" class="subtitle">PoC B3 - Lab VMware (vmnet2) + Azure France Central</text>

  <!-- Utilisateurs -->
  <rect x="40" y="80" width="200" height="320" rx="4" fill="#FFFFFF" stroke="#8A8886" stroke-dasharray="6,4"/>
  <text x="140" y="102" text-anchor="middle" class="zone-label">Utilisateurs</text>
  <use href="#ico-cloud" x="116" y="120" width="48" height="48"/>
  <text x="140" y="182" text-anchor="middle" class="icon-label">Internet</text>
  <use href="#ico-vpn" x="116" y="210" width="48" height="48"/>
  <text x="140" y="272" text-anchor="middle" class="icon-label">WireGuard</text>
  <text x="140" y="286" text-anchor="middle" class="icon-sublabel">10.20.100.0/24</text>
  <rect x="70" y="310" width="140" height="48" rx="3" fill="#FAFAFA" stroke="#E1DFDD"/>
  <text x="140" y="338" text-anchor="middle" class="icon-label">Employes</text>

  <!-- On-Prem -->
  <rect x="260" y="80" width="520" height="420" rx="4" fill="#FAFAFA" stroke="#107C10" stroke-dasharray="8,5"/>
  <text x="280" y="102" class="zone-label">On-Premise - Lab VMware</text>
  <text x="280" y="118" class="icon-sublabel">vmnet2 - 10.20.0.0/16</text>

  <rect x="280" y="140" width="190" height="120" rx="4" fill="#FFFFFF" stroke="#E1DFDD"/>
  <use href="#ico-firewall" x="351" y="152" width="48" height="48"/>
  <text x="375" y="212" text-anchor="middle" class="icon-label">pfSense VM</text>
  <text x="375" y="226" text-anchor="middle" class="icon-sublabel">WAN vmnet8 | LAN vmnet2</text>
  <text x="375" y="240" text-anchor="middle" class="icon-sublabel">10.20.0.1</text>

  <rect x="490" y="140" width="270" height="120" rx="4" fill="#FFFFFF" stroke="#E1DFDD"/>
  <use href="#ico-host" x="601" y="152" width="48" height="48"/>
  <text x="625" y="212" text-anchor="middle" class="icon-label">Hote VMware</text>
  <text x="625" y="226" text-anchor="middle" class="icon-sublabel">10.20.0.254</text>

  <rect x="280" y="280" width="480" height="70" rx="4" fill="#FFFFFF" stroke="#E1DFDD"/>
  <text x="295" y="300" class="icon-label">6 VLAN (10-60) - voir network_vlan.svg</text>

  <rect x="280" y="370" width="220" height="90" rx="4" fill="#FFFFFF" stroke="#8764B8" stroke-dasharray="5,3"/>
  <use href="#ico-monitor" x="366" y="380" width="48" height="48"/>
  <text x="390" y="440" text-anchor="middle" class="icon-label">Grafana + Loki</text>
  <text x="390" y="454" text-anchor="middle" class="icon-sublabel">syslog pfSense :1514</text>

  <!-- Azure -->
  <rect x="800" y="80" width="440" height="420" rx="4" fill="#F8FBFF" stroke="#0078D4" stroke-dasharray="8,5"/>
  <text x="820" y="102" class="zone-label">Azure - France Central</text>

  <use href="#ico-identity" x="830" y="130" width="48" height="48"/>
  <text x="854" y="192" text-anchor="middle" class="icon-label">Entra ID</text>
  <use href="#ico-registry" x="960" y="130" width="48" height="48"/>
  <text x="984" y="192" text-anchor="middle" class="icon-label">ACR</text>
  <use href="#ico-blob" x="1090" y="130" width="48" height="48"/>
  <text x="1114" y="192" text-anchor="middle" class="icon-label">Blob</text>

  <rect x="820" y="220" width="400" height="110" rx="4" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
  <use href="#ico-container" x="840" y="235" width="48" height="48"/>
  <text x="864" y="297" class="icon-label">ACI room-booking</text>
  <text x="864" y="313" class="icon-sublabel">Flask + PostgreSQL + Redis :8080</text>

  <!-- CI/CD -->
  <rect x="40" y="530" width="1200" height="100" rx="4" fill="#FAFAFA" stroke="#24292F" stroke-dasharray="8,5"/>
  <text x="60" y="552" class="zone-label">DevOps / CI-CD</text>
  <use href="#ico-cicd" x="80" y="565" width="48" height="48"/>
  <text x="104" y="615" text-anchor="middle" class="icon-label">GitHub Actions</text>
  <use href="#ico-registry" x="280" y="565" width="48" height="48"/>
  <text x="304" y="615" text-anchor="middle" class="icon-label">Push ACR</text>
  <use href="#ico-container" x="480" y="565" width="48" height="48"/>
  <text x="504" y="615" text-anchor="middle" class="icon-label">Deploy ACI</text>

  <!-- Fleches simples (comme schema classique) -->
  <g fill="none">
    <line x1="240" y1="234" x2="280" y2="234" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="248" y="226" class="flow-gray">UDP 51820</text>

    <line x1="470" y1="200" x2="490" y2="200" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>

    <line x1="470" y1="250" x2="390" y2="370" stroke="#8764B8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
    <text x="400" y="300" class="flow-gray">syslog</text>

    <line x1="520" y1="300" x2="820" y2="280" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
    <text x="620" y="288" class="flow">HTTPS (utilisateurs)</text>

    <line x1="220" y1="545" x2="280" y2="545" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="420" y1="545" x2="480" y2="545" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arr)"/>

    <line x1="1020" y1="330" x2="1020" y2="530" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
    <text x="1030" y="430" class="flow">HTTPS + JWT</text>
  </g>

  <text x="640" y="680" text-anchor="middle" class="note">SIEM Wazuh = cible production - PoC supervision via Grafana/Loki</text>
  <text x="640" y="700" text-anchor="middle" class="note">Edition SVG : Inkscape, draw.io, VS Code - voir docs/architecture/EDITING.md</text>
</svg>
