<?xml version="1.0" encoding="UTF-8"?>
<!-- Schema logique VLAN on-prem : pfSense, switch trunk, 6 VLANs.
     Azure Blob = stockage cloud pour fichiers de sauvegarde BDD (hors site). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
      .box-title { font-size: 12px; font-weight: 700; fill: #222; }
      .text { font-size: 11px; fill: #444; }
      .note { font-size: 10px; fill: #666; font-style: italic; }
      .flow { font-size: 10px; fill: #0078D4; font-weight: 600; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0078D4"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#f7f9fb"/>
  <text x="550" y="32" text-anchor="middle" class="title">Smart Office 2.0 - Schema logique reseau (VLANs)</text>
  <text x="550" y="52" text-anchor="middle" class="note">On-prem uniquement - pfSense 2.7 - Lab VMware - 10.20.0.0/16</text>

  <!-- Blocs -->
  <ellipse cx="550" cy="95" rx="95" ry="38" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="550" y="100" text-anchor="middle" class="box-title">INTERNET / FAI</text>

  <rect x="450" y="155" width="200" height="90" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="465" y="178" class="box-title">pfSense Firewall</text>
  <text x="465" y="196" class="text">WAN: DHCP (vmnet8)</text>
  <text x="465" y="212" class="text">LAN: 10.20.0.1/24</text>
  <text x="465" y="228" class="text">WireGuard WG_VPN 10.20.100.1/24</text>

  <rect x="430" y="268" width="240" height="48" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="550" y="297" text-anchor="middle" class="box-title">Managed Switch (VLAN Trunk 802.1Q)</text>

  <rect x="50" y="380" width="125" height="80" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="62" y="402" class="box-title">VLAN 10 MGMT</text>
  <text x="62" y="420" class="text">10.20.10.0/24</text>
  <text x="62" y="436" class="text">Switches, ILO</text>

  <!-- WireGuard entre VLAN 10 et 20 -->
  <rect x="183" y="510" width="72" height="88" rx="6" fill="#eef6ff" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="219" y="530" text-anchor="middle" class="box-title">WireGuard</text>
  <text x="219" y="546" text-anchor="middle" class="text">10.20.100.0/24</text>
  <text x="219" y="562" text-anchor="middle" class="text">VLAN 20+50</text>
  <text x="219" y="578" text-anchor="middle" class="text">:51820</text>

  <rect x="268" y="380" width="125" height="80" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="280" y="402" class="box-title">VLAN 20 USERS</text>
  <text x="280" y="420" class="text">10.20.20.0/24</text>
  <text x="280" y="436" class="text">PC, imprimantes</text>

  <rect x="403" y="380" width="125" height="80" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="415" y="402" class="box-title">VLAN 30 WIFI</text>
  <text x="415" y="420" class="text">10.20.30.0/24</text>

  <rect x="538" y="380" width="125" height="80" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="550" y="402" class="box-title">VLAN 40 GUEST</text>
  <text x="550" y="420" class="text">10.20.40.0/24</text>
  <text x="550" y="436" class="text">Isole (Internet)</text>

  <rect x="673" y="380" width="125" height="80" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="685" y="402" class="box-title">VLAN 50 SERVERS</text>
  <text x="685" y="420" class="text">10.20.50.0/24</text>
  <text x="685" y="436" class="text">AD, DB, App</text>

  <rect x="808" y="380" width="125" height="80" rx="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="820" y="402" class="box-title">VLAN 60 DMZ</text>
  <text x="820" y="420" class="text">10.20.60.0/24</text>

  <ellipse cx="960" cy="560" rx="88" ry="48" fill="#eef4fc" stroke="#0078D4" stroke-width="2"/>
  <text x="960" y="548" text-anchor="middle" class="box-title">Sauvegardes cloud</text>
  <text x="960" y="564" text-anchor="middle" class="text">Azure Blob Storage</text>
  <text x="960" y="580" text-anchor="middle" class="text">fichiers pg_dump</text>

  <!-- Connecteurs -->
  <g id="connectors" fill="none">
    <line x1="550" y1="133" x2="550" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="550" y1="245" x2="550" y2="268" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="550" cy="268" r="4" fill="#555"/>
    <line x1="550" y1="316" x2="550" y2="348" stroke="#555" stroke-width="2"/>
    <circle cx="550" cy="316" r="4" fill="#82b366" stroke="#fff" stroke-width="1"/>
    <line x1="112" y1="348" x2="870" y2="348" stroke="#555" stroke-width="2"/>
    <circle cx="550" cy="348" r="4" fill="#555"/>

    <line x1="112" y1="348" x2="112" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="112" cy="348" r="3" fill="#555"/>
    <line x1="330" y1="348" x2="330" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="330" cy="348" r="3" fill="#555"/>
    <line x1="465" y1="348" x2="465" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="465" cy="348" r="3" fill="#555"/>
    <line x1="600" y1="348" x2="600" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="600" cy="348" r="3" fill="#555"/>
    <line x1="735" y1="348" x2="735" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="735" cy="348" r="3" fill="#555"/>
    <line x1="870" y1="348" x2="870" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="870" cy="348" r="3" fill="#555"/>

    <!-- WireGuard -> pfSense : ligne droite entre VLAN 10 et 20 -->
    <line x1="219" y1="510" x2="219" y2="245" stroke="#0078D4" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
    <line x1="219" y1="245" x2="450" y2="245" stroke="#0078D4" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
    <text x="300" y="238" class="flow">UDP 51820</text>
    <circle cx="219" cy="510" r="4" fill="#0078D4"/>

    <!-- VLAN 50 -> sauvegardes cloud -->
    <path d="M735 460 L735 500 L960 500 L960 512" stroke="#0078D4" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
    <text x="830" y="492" class="flow">Backup BDD (hors site)</text>
  </g>
</svg>
